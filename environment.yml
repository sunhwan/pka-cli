name: pka-cli
channels:
  - conda-forge
dependencies:
  - python=3.10
  - rdkit
  - pandas
  - numpy<2
  - scipy
  - scikit-learn
  - pytest
  - pip
  - pip:
      - torch==2.2.2
      - torch-geometric==2.3.1
      # torch-scatter and torch-sparse are deliberately NOT listed here: they
      # `import torch` inside their own setup.py to build CPU extensions, but
      # pip's build isolation hides the torch installed above from that build
      # step, so a single combined `pip install` fails. They're installed
      # separately by scripts/setup_molgpka.sh, after torch is already in
      # place, with --no-build-isolation.
